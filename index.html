<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A compact multi-panel Bible reader" />
    <title>Bible</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="compact-toolbar">
        <div class="translation-list" id="translation-list" aria-label="Translation order"></div>
        <div class="header-actions">
          <button class="button button-secondary" id="open-search" type="button">
            <span aria-hidden="true">⌕</span> Search
          </button>
          <button class="button button-primary" id="add-panel" type="button">
            <span aria-hidden="true">＋</span> Add panel
          </button>
        </div>
      </div>
    </header>

    <main class="workspace">
      <div class="panel-track" id="panel-track" aria-live="polite"></div>
    </main>

    <dialog class="search-dialog" id="search-dialog">
      <div class="search-shell">
        <div class="search-header">
          <div>
            <h2>Search Bible</h2>
          </div>
          <button class="icon-button" id="close-search" type="button" aria-label="Close search">×</button>
        </div>

        <form class="search-form" id="search-form">
          <label class="search-input-wrap" for="search-input">
            <span aria-hidden="true">⌕</span>
            <input
              id="search-input"
              name="query"
              type="search"
              minlength="2"
              autocomplete="off"
              placeholder="e.g. 사랑, 광야, kingdom"
              required
            />
          </label>
          <button class="button button-primary" type="submit">Search</button>
        </form>

        <div class="search-meta" id="search-meta">Enter at least two characters.</div>
        <div class="search-results" id="search-results"></div>
      </div>
    </dialog>

    <template id="panel-template">
      <article class="bible-panel">
        <header class="panel-header">
          <div class="panel-selectors">
            <div class="combo book-combo">
              <input
                class="combo-input book-input"
                type="text"
                role="combobox"
                aria-label="Book"
                aria-autocomplete="list"
                aria-expanded="false"
                autocomplete="off"
                spellcheck="false"
              />
              <button class="combo-toggle" type="button" tabindex="-1" aria-label="Open book list">⌄</button>
              <div class="combo-menu" role="listbox"></div>
            </div>
            <div class="combo chapter-combo">
              <input
                class="combo-input chapter-input"
                type="text"
                role="combobox"
                aria-label="Chapter"
                aria-autocomplete="list"
                aria-expanded="false"
                autocomplete="off"
                inputmode="numeric"
              />
              <button class="combo-toggle" type="button" tabindex="-1" aria-label="Open chapter list">⌄</button>
              <div class="combo-menu" role="listbox"></div>
            </div>
            <button class="icon-button remove-panel" type="button" aria-label="Close panel">×</button>
          </div>
        </header>
        <div class="panel-content" tabindex="0"></div>
        <button class="chapter-nav previous-chapter" type="button" aria-label="Previous chapter">←</button>
        <button class="chapter-nav next-chapter" type="button" aria-label="Next chapter">→</button>
      </article>
    </template>

    <noscript>JavaScript is required to display the Bible text.</noscript>
    <script type="module" src="./app.js"></script>
  </body>
</html>
