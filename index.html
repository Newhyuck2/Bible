<!doctype html> 
<html lang="en"> 
  <head> 
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="description" content="A compact multi-panel Bible reader" />
    <meta name="asset-version" content="20260704-2" />
    <title>Bible</title>
    <link rel="stylesheet" href="./styles.css?v=20260704-2" />
  </head>
  <body>
    <header class="app-header">
      <div class="compact-toolbar">
        <div
          class="site-brand"
          id="site-brand"
          role="button"
          tabindex="0"
          aria-label="Reset to the default view"
          title="Reset to the default view"
        >
          <span class="site-cross" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 4v16M6.5 9h11"></path>
            </svg>
          </span>
          <span>Holy Bible</span>
        </div>
        <div class="translation-list" id="translation-list" aria-label="Translation order"></div>
        <div class="verse-layout-control" role="group" aria-label="Verse translation layout">
          <button id="verse-layout-stacked" type="button" aria-label="Stack translations vertically" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="4" width="16" height="6" rx="1.5"></rect>
              <rect x="4" y="14" width="16" height="6" rx="1.5"></rect>
            </svg>
          </button>
          <button id="verse-layout-columns" type="button" aria-label="Show translations side by side" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="8" height="16" rx="1.5"></rect>
              <rect x="13" y="4" width="8" height="16" rx="1.5"></rect>
            </svg>
          </button>
        </div>
        <div class="panel-count-control" role="group" aria-label="Panels per screen">
          <button id="panel-count-one" type="button" aria-label="Show one panel" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="5" y="4" width="14" height="16" rx="2"></rect>
            </svg>
          </button>
          <button id="panel-count-two" type="button" aria-label="Show two panels" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="8" height="16" rx="1.5"></rect>
              <rect x="13" y="4" width="8" height="16" rx="1.5"></rect>
            </svg>
          </button>
        </div>
        <div class="font-size-control" aria-label="Bible text size">
          <button id="font-size-down" type="button" aria-label="Decrease text size">−</button>
          <output id="font-size-value">14</output>
          <button id="font-size-up" type="button" aria-label="Increase text size">＋</button>
        </div>
        <div class="header-actions">
          <button class="button button-secondary" id="open-search" type="button" aria-label="Search Bible">
            <span aria-hidden="true">⌕</span> Search
          </button>
          <button class="button button-primary" id="add-panel" type="button" aria-label="Add Bible panel">
            <span aria-hidden="true">＋</span> Add panel
          </button>
        </div>
      </div>
    </header>

    <main class="workspace">
      <div class="panel-track" id="panel-track" aria-live="polite"></div>
    </main>

    <dialog class="search-dialog" id="search-dialog">
      <div class="search-shell">
        <div class="search-header">
          <div>
            <h2>Search Bible</h2>
          </div>
          <button class="icon-button" id="close-search" type="button" aria-label="Close search">×</button>
        </div>

        <form class="search-form" id="search-form">
          <label class="search-input-wrap" for="search-input">
            <span aria-hidden="true">⌕</span>
            <input
              id="search-input"
              name="query"
              type="search"
              minlength="2"
              autocomplete="off"
              required
            />
          </label>
          <button class="button button-primary" type="submit">Search</button>
        </form>

        <div class="search-meta" id="search-meta">Enter at least two characters.</div>
        <div class="search-body">
          <nav class="search-book-list" id="search-book-list" aria-label="Books in search results"></nav>
          <div class="search-results" id="search-results"></div>
        </div>
      </div>
    </dialog>

    <dialog class="copy-dialog" id="copy-dialog">
      <div class="copy-shell">
        <div class="copy-header">
          <div>
            <h2>Copy verses</h2>
            <p id="copy-reference"></p>
          </div>
          <button class="icon-button" id="close-copy" type="button" aria-label="Close copy options">×</button>
        </div>

        <fieldset>
          <legend>Translations</legend>
          <div class="copy-translation-options" id="copy-translations"></div>
        </fieldset>

        <fieldset>
          <legend>Order</legend>
          <label class="copy-order-option">
            <input type="radio" name="copy-order" value="verse" checked />
            <strong>Verse by verse</strong>
          </label>
          <label class="copy-order-option">
            <input type="radio" name="copy-order" value="translation" />
            <strong>Translation by translation</strong>
          </label>
        </fieldset>

        <div class="copy-actions">
          <span class="copy-status" id="copy-status" aria-live="polite"></span>
          <button class="button button-secondary" id="cancel-copy" type="button">Cancel</button>
          <button class="button button-primary" id="confirm-copy" type="button">Copy</button>
        </div>
      </div>
    </dialog>

    <template id="panel-template">
      <article class="bible-panel">
        <header class="panel-header">
          <div class="panel-selectors">
            <button class="icon-button remove-panel" type="button" aria-label="Delete panel">×</button>
            <span class="panel-number" aria-label="Panel 1" title="Panel 1">1</span>
            <div class="selector-control book-selector">
              <span class="selector-label">Book</span>
              <div class="combo book-combo">
                <input
                  class="combo-input book-input"
                  type="text"
                  role="combobox"
                  aria-label="Book"
                  aria-autocomplete="list"
                  aria-expanded="false"
                  autocomplete="off"
                  spellcheck="false"
                />
                <button class="combo-toggle" type="button" tabindex="-1" aria-label="Open book list">⌄</button>
                <div class="combo-menu" role="listbox"></div>
              </div>
            </div>
            <button class="chapter-nav previous-chapter" type="button" aria-label="Previous chapter">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 5 10 12l4 7"></path>
              </svg>
            </button>
            <div class="selector-control chapter-selector">
              <span class="selector-label">Chapter</span>
              <div class="combo chapter-combo">
                <input
                  class="combo-input chapter-input"
                  type="text"
                  role="combobox"
                  aria-label="Chapter"
                  aria-autocomplete="list"
                  aria-expanded="false"
                  autocomplete="off"
                  inputmode="numeric"
                />
                <button class="combo-toggle" type="button" tabindex="-1" aria-label="Open chapter list">⌄</button>
                <div class="combo-menu" role="listbox"></div>
              </div>
            </div>
            <button class="chapter-nav next-chapter" type="button" aria-label="Next chapter">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m10 5 4 7-4 7"></path>
              </svg>
            </button>
          </div>
        </header>
        <div class="panel-content" tabindex="0"></div>
        <button class="copy-selection" type="button" aria-label="Copy selected verses" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="8" y="8" width="11" height="11" rx="2"></rect>
            <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path>
          </svg>
        </button>
        <button class="cancel-selection" type="button" aria-label="Cancel verse selection" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18"></path>
          </svg>
        </button>
        <button class="panel-move panel-move-left" type="button" aria-label="Move panel left">
          <span aria-hidden="true"></span>
        </button>
        <button class="panel-move panel-move-right" type="button" aria-label="Move panel right">
          <span aria-hidden="true"></span>
        </button>
        <div class="panel-resize-handle" role="separator" aria-orientation="vertical" aria-label="Resize panel"></div>
      </article>
    </template>

    <div class="update-banner" id="update-banner" hidden>
      <span>A new version of this site is available.</span>
      <button type="button" id="update-reload">Refresh</button>
    </div>

    <noscript>JavaScript is required to display the Bible text.</noscript>
    <script type="module" src="./app.js?v=20260704-2"></script>
  </body>
</html>
