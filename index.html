<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /> 
    <meta 
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="description" content="A compact multi-panel Bible reader" />
    <meta name="asset-version" content="20260724-3" />
    <meta name="theme-color" content="#284f43" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bible" />
    <title>Bible</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png" />
    <link rel="stylesheet" href="./styles.css?v=20260724-3" />
  </head>
  <body>
    <header class="app-header">
      <div class="compact-toolbar">
        <div
          class="site-brand"
          id="site-brand"
          role="button"
          tabindex="0"
          aria-label="Reset to the default view"
          title="Reset to the default view"
        >
          <span class="site-cross" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 4v16M6.5 9h11"></path>
            </svg>
          </span>
          <span>Holy Bible</span>
        </div>
        <div class="panel-count-control" role="group" aria-label="Panels per screen">
          <button id="panel-count-one" type="button" aria-label="Show one panel" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="5" y="4" width="14" height="16" rx="2"></rect>
            </svg>
          </button>
          <button id="panel-count-two" type="button" aria-label="Show two panels" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="8" height="16" rx="1.5"></rect>
              <rect x="13" y="4" width="8" height="16" rx="1.5"></rect>
            </svg>
          </button>
        </div>
        <div class="font-size-control" aria-label="Bible text size">
          <button id="font-size-down" type="button" aria-label="Decrease text size">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h14"></path>
            </svg>
          </button>
          <output id="font-size-value">11</output>
          <button id="font-size-up" type="button" aria-label="Increase text size">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
          </button>
        </div>
        <div class="header-actions">
          <button class="button button-secondary" id="open-search" type="button" aria-label="Search Bible" title="Search Bible">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6.3"></circle>
              <path d="m15.7 15.7 4.6 4.6"></path>
            </svg>
          </button>
          <button class="button button-primary" id="add-panel" type="button" aria-label="Add Bible panel" title="Add Bible panel">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="workspace">
      <div class="panel-track" id="panel-track" aria-live="polite"></div>
    </main>

    <dialog class="search-dialog" id="search-dialog">
      <div class="search-shell">
        <div class="search-header">
          <div>
          </div>
          <button class="icon-button close-button" id="close-search" type="button" aria-label="Close search"><span aria-hidden="true"></span></button>
        </div>

        <form class="search-form" id="search-form">
          <div class="translation-controls dialog-translation-controls" id="search-translation-controls">
            <div class="translation-picker" id="search-translation-picker">
              <button
                class="translation-picker-toggle"
                id="search-translation-picker-toggle"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-label="Add search version"
                title="Add version"
              >
                <svg class="picker-plus" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14"></path>
                </svg>
              </button>
              <div
                class="translation-picker-menu"
                id="search-translation-picker-menu"
                hidden
                role="listbox"
                aria-label="Available search versions"
              ></div>
            </div>
            <div class="translation-list" id="search-translation-list" aria-label="Search versions"></div>
          </div>
          <label class="search-input-wrap" for="search-input">
            <span aria-hidden="true"></span>
            <input
              id="search-input"
              name="query"
              type="search"
              minlength="1"
              autocomplete="off"
              required
            />
          </label>
          <button class="button button-primary icon-only-button" type="submit" aria-label="Search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="m16 16 4 4"></path>
            </svg>
          </button>
        </form>

        <div class="search-meta" id="search-meta"></div>
        <div class="search-body">
          <nav class="search-book-list" id="search-book-list" aria-label="Books in search results"></nav>
          <div class="search-results" id="search-results"></div>
        </div>
      </div>
    </dialog>

    <dialog class="copy-dialog" id="copy-dialog">
      <div class="copy-shell">
        <div class="copy-header">
          <div>
            <p id="copy-reference"></p>
          </div>
          <button class="icon-button close-button" id="close-copy" type="button" aria-label="Close copy options"><span aria-hidden="true"></span></button>
        </div>

        <fieldset>
          <legend>Versions</legend>
          <div class="translation-controls dialog-translation-controls" id="copy-translation-controls">
            <div class="translation-picker" id="copy-translation-picker">
              <button
                class="translation-picker-toggle"
                id="copy-translation-picker-toggle"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-label="Add copy version"
                title="Add version"
              >
                <svg class="picker-plus" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14"></path>
                </svg>
              </button>
              <div
                class="translation-picker-menu"
                id="copy-translation-picker-menu"
                hidden
                role="listbox"
                aria-label="Available copy versions"
              ></div>
            </div>
            <div class="translation-list copy-translation-options" id="copy-translations" aria-label="Copy versions"></div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Order</legend>
          <label class="copy-order-option">
            <input type="radio" name="copy-order" value="verse" checked />
            <strong>Verse by verse</strong>
          </label>
          <label class="copy-order-option">
            <input type="radio" name="copy-order" value="translation" />
            <strong>Version by version</strong>
          </label>
        </fieldset>

        <div class="copy-actions">
          <span class="copy-status" id="copy-status" aria-live="polite"></span>
          <button class="button button-primary icon-only-button" id="confirm-copy" type="button" aria-label="Copy selected verses">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="8" y="8" width="11" height="11" rx="2"></rect>
              <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path>
            </svg>
          </button>
        </div>
      </div>
    </dialog>

    <template id="panel-template">
      <article class="bible-panel">
        <header class="panel-header">
          <div class="panel-selectors">
            <button class="panel-history panel-history-back" type="button" aria-label="Previous passage in history">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 12H5"></path>
                <path d="m11 6-6 6 6 6"></path>
              </svg>
            </button>
            <button class="panel-history panel-history-forward" type="button" aria-label="Next passage in history">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14"></path>
                <path d="m13 6 6 6-6 6"></path>
              </svg>
            </button>
            <div class="selector-control book-selector">
              <div class="combo book-combo">
                <input
                  class="combo-input book-input"
                  type="text"
                  role="combobox"
                  aria-label="Book"
                  aria-autocomplete="list"
                  aria-expanded="false"
                  autocomplete="off"
                  spellcheck="false"
                />
                <div class="combo-menu" role="listbox"></div>
              </div>
            </div>
            <div class="selector-control chapter-selector">
              <div class="combo chapter-combo">
                <input
                  class="combo-input chapter-input"
                  type="text"
                  role="combobox"
                  aria-label="Chapter"
                  aria-autocomplete="list"
                  aria-expanded="false"
                  autocomplete="off"
                  inputmode="numeric"
                />
                <div class="combo-menu" role="listbox"></div>
              </div>
            </div>
            <span class="selector-separator" aria-hidden="true">:</span>
            <div class="selector-control verse-selector">
              <div class="combo verse-combo">
                <input
                  class="combo-input verse-input"
                  type="text"
                  role="combobox"
                  aria-label="Verse"
                  aria-autocomplete="list"
                  aria-expanded="false"
                  autocomplete="off"
                  inputmode="numeric"
                />
                <div class="combo-menu" role="listbox"></div>
              </div>
            </div>
            <button class="icon-button close-button remove-panel" type="button" aria-label="Delete panel"><span aria-hidden="true"></span></button>
          </div>
          <div class="translation-controls dialog-translation-controls panel-translation-controls">
            <div class="translation-picker panel-translation-picker">
              <button
                class="translation-picker-toggle panel-translation-picker-toggle"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-label="Add version"
                title="Add version"
              >
                <svg class="picker-plus" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14"></path>
                </svg>
              </button>
              <div
                class="translation-picker-menu panel-translation-picker-menu"
                role="listbox"
                aria-label="Available versions"
                hidden
              ></div>
            </div>
            <div class="translation-list panel-translation-list" aria-label="Selected versions"></div>
            <div class="verse-layout-control panel-verse-layout-control" role="group" aria-label="Verse translation layout">
              <button class="panel-verse-layout-stacked" type="button" aria-label="Stack translations vertically" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 6h14M5 12h14M5 18h14" stroke-linecap="round"></path>
                </svg>
              </button>
              <button class="panel-verse-layout-columns" type="button" aria-label="Show translations side by side" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 5v14M12 5v14M18 5v14" stroke-linecap="round"></path>
                </svg>
              </button>
            </div>
          </div>
        </header>
        <div class="panel-content" tabindex="0"></div>
        <button class="chapter-jump chapter-jump-previous previous-chapter" type="button" aria-label="Previous chapter">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 5 8 12l7 7"></path>
          </svg>
        </button>
        <button class="chapter-jump chapter-jump-next next-chapter" type="button" aria-label="Next chapter">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m9 5 7 7-7 7"></path>
          </svg>
        </button>
        <button class="copy-selection" type="button" aria-label="Copy selected verses" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="8" y="8" width="11" height="11" rx="2"></rect>
            <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path>
          </svg>
        </button>
        <div class="selection-mode-control" role="group" aria-label="Verse selection mode" hidden>
          <button class="selection-mode-button selection-mode-range" type="button" aria-label="Select verse range">
            <span class="selection-bars" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
          <button class="selection-mode-button selection-mode-individual" type="button" aria-label="Select individual verses">
            <span class="selection-bars selection-bars-gap" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
        </div>
        <button class="cancel-selection" type="button" aria-label="Cancel verse selection" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18"></path>
          </svg>
        </button>
        <button class="panel-move panel-move-left" type="button" aria-label="Move panel left">
          <span aria-hidden="true"></span>
        </button>
        <button class="panel-move panel-move-right" type="button" aria-label="Move panel right">
          <span aria-hidden="true"></span>
        </button>
        <div class="panel-resize-handle" role="separator" aria-orientation="vertical" aria-label="Resize panel"></div>
      </article>
    </template>

    <noscript>JavaScript is required to display the Bible text.</noscript>
    <script type="module" src="./app.js?v=20260724-3"></script>
  </body>
</html>
